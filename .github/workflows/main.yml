name: Build Host Scanner APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm commandlinetools-linux-*.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure and source code
        run: |
          mkdir -p app/src/main/java/com/example/hostscanner
          mkdir -p app/src/main/res/layout

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "HostScanner"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.hostscanner'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.hostscanner"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application android:allowBackup="true" android:label="Host Scanner"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/example/hostscanner/MainActivity.kt << 'KOTLIN'
          package com.example.hostscanner

          import android.os.Bundle
          import android.view.View
          import android.widget.Button
          import android.widget.ProgressBar
          import android.widget.TextView
          import android.widget.LinearLayout
          import android.widget.ScrollView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.lifecycle.lifecycleScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          import okhttp3.OkHttpClient
          import okhttp3.Request
          import java.util.concurrent.TimeUnit

          class MainActivity : AppCompatActivity() {
              private lateinit var btnScan: Button
              private lateinit var progressBar: ProgressBar
              private lateinit var resultsContainer: LinearLayout

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(40, 40, 40, 40)
                  }
                  btnScan = Button(this).apply {
                      text = "ابدأ الفحص"
                      textSize = 18f
                  }
                  progressBar = ProgressBar(this).apply { visibility = View.GONE }
                  resultsContainer = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }
                  val scrollView = ScrollView(this).apply { addView(resultsContainer) }
                  layout.addView(btnScan)
                  layout.addView(progressBar)
                  layout.addView(scrollView, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 0, 1f))
                  setContentView(layout)

                  btnScan.setOnClickListener {
                      progressBar.visibility = View.VISIBLE
                      resultsContainer.removeAllViews()
                      startScan()
                  }
              }

              private fun startScan() {
                  val hosts = listOf(
                      "http://0.facebook.com",
                      "http://m.facebook.com",
                      "http://freebasics.com",
                      "http://ar.wikipedia.org",
                      "http://en.wikipedia.org",
                      "http://zero.google.com",
                      "http://www.bing.com",
                      "http://m.youtube.com",
                      "http://m.twitter.com",
                      "http://www.google.com"
                  )
                  lifecycleScope.launch {
                      withContext(Dispatchers.IO) {
                          val client = OkHttpClient.Builder()
                              .connectTimeout(4, TimeUnit.SECONDS)
                              .readTimeout(4, TimeUnit.SECONDS)
                              .followRedirects(false)
                              .build()
                          for (url in hosts) {
                              val result = try {
                                  val request = Request.Builder().url(url).head().build()
                                  val response = client.newCall(request).execute()
                                  if (response.isSuccessful) "✅ $url (${response.code})"
                                  else "❌ $url (${response.code})"
                              } catch (e: Exception) {
                                  "❌ $url (${e.message?.take(30)})"
                              }
                              withContext(Dispatchers.Main) {
                                  val tv = TextView(this@MainActivity).apply {
                                      text = result; textSize = 16f; setPadding(8,8,8,8)
                                  }
                                  resultsContainer.addView(tv)
                              }
                          }
                          withContext(Dispatchers.Main) { progressBar.visibility = View.GONE }
                      }
                  }
              }
          }
          KOTLIN

      - name: Set up Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          unset ANDROID_HOME
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hostscanner-debug
          path: app/build/outputs/apk/debug/app-debug.apk
